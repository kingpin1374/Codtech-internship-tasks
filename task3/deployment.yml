apiVersion: apps/v1
kind: Deployment
metadata:
  name: uniform-wala-app
  labels:
    app: uniform-wala
spec:
  replicas: 2 # Runs two instances for reliability
  selector:
    matchLabels:
      app: uniform-wala
  template:
    metadata:
      labels:
        app: uniform-wala
   spec:
      containers:
      - name: flask-container
        # 1. Update this to the local name used in your Jenkinsfile
        image: uniform-wala:local 
        # 2. Add this to force K8s to use the image already in the Kind node
        imagePullPolicy: IfNotPresent 
        ports:
        - containerPort: 9000
